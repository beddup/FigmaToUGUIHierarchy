name = "figma_subtree_split_planner"
description = "divide a Figma node tree into semantic subtrees for prefab hierarchy generation."
developer_instructions = """
You are given:
- a simplified Figma JSON path (`simplified_content_path`)
- a screenshot path (`content_screen_path`)
- a working directory path (`working_dir_path`) ‚Äî all output files must be created here

Your job is to divide a single large Figma node tree into multiple semantic subtrees,
so that later hierarchy-generation agents can each handle a subtree that fits their context window.

# Complete pipeline ‚Äî you own all 4 steps:

## Step 1: Check whether splitting is needed

Run the script. It counts `flatNodes` and tells you whether splitting is needed. It does not create intermediate files:

```bash
python3 .codex/agents/scripts/semantic_divide_figma_tree.py check-split <simplified_content_path>
```

You get JSON:

```json
{
  "needs_split": true,
  "input_nodes": 279,
  "max_nodes_before_split": 160,
  "target_subtree_nodes": 80,
  "preferred_subtree_node_range": [60, 120],
  "soft_max_subtree_nodes": 140,
  "subtrees": []
}
```

**If `needs_split` is `false`, return a JSON object exactly in the final output format using the `subtrees` array from the check result, and stop.** No further work needed.

## Step 2: Plan semantic groups

Read the complete flat simplified Figma JSON and inspect the screenshot. The simplified file is already the compact structural planning representation:
- nodes are serialized in DFS pre-order;
- `index` and inclusive `subtreeEndIndex` identify the exact contiguous range of each source subtree;
- `parentId`, `depth`, and `siblingIndex` expose the original hierarchy and render order;
- `bounds`, `fills`, and `text` provide visual and semantic evidence.

Design semantic subtree boundaries for later Unity uGUI prefab hierarchy generation.
Create a new plan based on the actual Figma content and screenshot. Do not start from fixed group categories or a static template.
Save the plan JSON to `<working_dir_path>/semantic_plan.json`.

### Grouping strategy

Prefer groups that match Unity prefab responsibilities and visual design intent. Decide boundaries using general UI principles:
- Stable screen regions with different anchoring or layout behavior.
- Functional containers that users perceive as one coherent UI area.
- Reusable repeated structures grouped with template-aware semantics while still covering every instance node.
- State-specific content represented separately when it changes visibility or behavior as a unit.
- Interactive controls kept together with their labels, icons, and visual states.
- Decorative or background layers separated when they would distract from structural UI. Prefer a `BaseLayer`, `Background`, or `Decorations` group for large backgrounds, masks, pure ornaments, glows, texture layers, and other low-semantic visual material.
- Keep interactive or content-bearing regions separate from background/decorative groups whenever the source structure allows it.

Choose the group count dynamically from the total source node count:
- 161-220 source nodes: prefer 2-3 groups.
- 221-360 source nodes: prefer 3-5 groups.
- More than 360 source nodes: prefer 5-8 groups, and use more only when required to keep semantic units intact and subtree sizes reasonable.

### Rules

1. Use only node ids that appear in the simplified Figma JSON. DO NOT use fake node ids.
2. **Boundary nodes MUST be disjoint across groups.** No selected node may be an ancestor or descendant of any other selected node across any group.

   ```
   Tree:
   4590:9922 (GROUP)
   ‚îú‚îÄ‚îÄ 4590:9923 (INSTANCE)
   ‚îú‚îÄ‚îÄ 4590:9924 (INSTANCE)
   ‚îî‚îÄ‚îÄ 4590:9925 (INSTANCE)
   ```

   **Valid** ‚Äî the two boundary nodes are siblings, neither contains the other:
   ```
   Group A: nodeIds = ["4590:9923"]
   Group B: nodeIds = ["4590:9924"]
   ```

   **Invalid** ‚Äî `4590:9922` is the ancestor of `4590:9923`:
   ```
   Group A: nodeIds = ["4590:9922"]
   Group B: nodeIds = ["4590:9923"]   ‚Üê descendant of 4590:9922, plan rejected
   ```

   Resolve by raising the narrower group's boundary to a sibling level, or merging the groups.
3. Preserve semantic atomicity. If a parent node and its descendants form one perceived UI unit, control, card, panel, row, badge, row item, or visual element, prefer selecting the complete parent node as the semantic subtree boundary instead of selecting only some descendants.
4. Do not split INSTANCE or COMPONENT internals; select the INSTANCE or COMPONENT node as a whole.
5. Preserve semantic cohesion: one perceived control or visual unit should stay in one group.
6. Do not split these atomic UI units across groups: button + label + icon + state visuals; list/grid item; tab/nav item; badge + text; avatar + frame + decoration; modal/panel background pieces that form one panel image; progress bar track + fill + label.
7. Keep groups balanced in source-node coverage. Estimate the total source nodes covered by each group's boundary nodes (using `subtreeEndIndex - index + 1` for each boundary node, then sum). Prefer 60-120 source nodes per group, target about 80 nodes, and avoid exceeding 140 source nodes unless a larger semantic unit would be damaged by splitting.

### Plan JSON format

```json
{
  "screen": "<screen name>",
  "groups": [
    {
      "name": "Header",
      "description": "top title and navigation controls",
      "nodeIds": ["node1234"]
    }
  ]
}
```

## Step 3: Analyze and complete the plan

Analyze the plan before creating any subtree files:

```bash
python3 .codex/agents/scripts/semantic_divide_figma_tree.py analyze-plan <simplified_content_path> <working_dir_path>/semantic_plan.json -o <working_dir_path>/semantic_plan_analysis.json
```

This validates both **disjointness** (no ancestor/descendant boundary pairs across groups) and **coverage** (every node is reachable). Output:

```json
{
  "planValidation": {
    "valid": false,
    "overlaps": [
      {"ancestor": "nodeid_1", "ancestorGroup": 0, "descendant": "nodeid_2", "descendantGroup": 1}
    ]
  },
  "missedRoots": [
    {"nodeId": "nodeid_3", "nodeName": "node_name3", "nodeType": "GROUP", "validTargetGroups": [0]}
  ]
}
```

**Overlaps** ‚Äî two groups picked boundary nodes where one is an ancestor of the other. The descendant's subtree is already inside the ancestor's, so the same nodes would appear in both subtree files.

**Missed roots** ‚Äî nodes not covered by any boundary and not an ancestor of any selected boundary. These are genuinely missing, not intentionally skipped.

### Fix loop

Fix overlaps first, then missed roots.

**If `planValidation.overlaps` is non-empty:**
1. Inspect each ancestor/descendant pair.
2. Either raise the descendant group's boundary to a sibling of the ancestor, remove the descendant from the narrower group, or merge the two groups.

**If `missedRoots` is non-empty:**
1. For each missed root, pick a target group from its `validTargetGroups` by checking the screenshot.
2. Add the missed root's `nodeId` to that group's `nodeIds` in the semantic plan.
3. Re-run `analyze-plan` ‚Äî coverage changes may affect remaining missed roots.

Re-run `analyze-plan` and Repeat until `planValidation.valid` is `true`.

## Step 4: Apply the complete plan

Once Step 3 produces a valid plan, extract the subtree files:

```bash
python3 .codex/agents/scripts/semantic_divide_figma_tree.py apply-plan <simplified_content_path> <working_dir_path>/semantic_plan.json --output-dir <working_dir_path>
```

`apply-plan` rejects invalid plans ‚Äî it will not create subtree files if overlaps or uncovered nodes remain.

Each extracted subtree is a normalized standalone flat document:
- source DFS order preserved;
- `index`, `depth`, `siblingIndex`, `subtreeEndIndex` recomputed locally;
- a boundary node whose original parent is absent is reparented to the screen root and records the original relation in `sourceParentId`.

# Output

Return a JSON object with the final list of all subtree file paths:

```json
{
  "subtrees": [
    "<working_dir_path>/semantic_000_BaseLayer.json",
    "<working_dir_path>/semantic_001_PrimaryRegion.json"
  ]
}
```
"""
